name: Daily Dad Joke Pipeline

on:
  schedule:
    # Off the top of the hour to dodge GitHub Actions queue congestion
    - cron: '7 14 * * *'   # ~10:07am ET / 7:07am PT
    - cron: '7 22 * * *'   # ~6:07pm ET / 3:07pm PT
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  generate-dad-joke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          HEYGEN_API_KEY: ${{ secrets.HEYGEN_API_KEY }}
          HEYGEN_AVATAR_ID: ${{ secrets.HEYGEN_AVATAR_ID }}
          POSTFORME_API_KEY: ${{ secrets.POSTFORME_API_KEY }}
          POSTFORME_TIKTOK_ACCOUNT_ID: ${{ secrets.POSTFORME_TIKTOK_ACCOUNT_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python pipeline.py
