<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Dad Joke Fix</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #1a1a2e; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  body { padding: 24px 18px 40px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  h1 { color: #ffc346; margin: 0 0 18px; font-size: 26px; letter-spacing: 0.5px; text-transform: uppercase; }
  video { width: 100%; max-width: 480px; height: auto; border-radius: 14px; background: #000; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
  button {
    margin-top: 22px;
    background: #ffc346;
    color: #15151f;
    border: none;
    border-radius: 999px;
    padding: 18px 32px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    max-width: 480px;
    -webkit-tap-highlight-color: rgba(0,0,0,0);
  }
  button:active { transform: scale(0.98); }
  .hint { margin-top: 18px; padding: 14px 18px; background: rgba(255,195,70,0.12); border-radius: 12px; line-height: 1.55; font-size: 15px; max-width: 480px; }
  .hint strong { color: #ffc346; }
  .small { color: #888; font-size: 13px; margin-top: 18px; max-width: 480px; line-height: 1.5; text-align: center; }
  .small a { color: #ffc346; text-decoration: none; word-break: break-all; }
  #status { margin-top: 16px; font-size: 14px; color: #ffc346; min-height: 20px; max-width: 480px; }
</style>
</head>
<body>
  <h1>Dad Joke Fix</h1>
  <video id="player" controls playsinline></video>
  <button id="saveBtn">📥 Save to Photos</button>
  <div id="status"></div>
  <div class="hint">
    <strong>If the button doesn't work:</strong><br>
    Long-press the video above → tap <strong>Save to Photos</strong> in the menu.
  </div>
  <div class="small">
    Direct download: <a id="dl" href="#" download>tap here</a>
  </div>

<script>
(function () {
  var name = (window.location.hash || '').replace(/^#/, '').trim();
  if (!name) {
    document.getElementById('status').textContent = 'No video specified in the link.';
    return;
  }
  var videoUrl = 'videos/' + name;
  var player = document.getElementById('player');
  var dl = document.getElementById('dl');
  var btn = document.getElementById('saveBtn');
  var status = document.getElementById('status');

  player.src = videoUrl;
  dl.href = videoUrl;
  dl.setAttribute('download', name);

  btn.addEventListener('click', async function () {
    status.textContent = 'Preparing video...';
    try {
      var resp = await fetch(videoUrl);
      if (!resp.ok) throw new Error('Network ' + resp.status);
      var blob = await resp.blob();
      var file = new File([blob], name, { type: 'video/mp4' });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        status.textContent = 'Opening share sheet — pick Save Video.';
        await navigator.share({ files: [file], title: 'Dad Joke Fix' });
        status.textContent = '✅ Shared. Pick "Save Video" to send to Photos.';
      } else {
        // Fallback: trigger download via anchor
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = name;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        status.textContent = '⬇️ Download started. Move from Files to Photos manually.';
      }
    } catch (err) {
      status.textContent = '⚠️ ' + err.message + ' — try the long-press method below.';
    }
  });
})();
</script>
</body>
</html>
