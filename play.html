<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Dad Joke Fix</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #1a1a2e; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  body { padding: 24px 18px 40px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  h1 { color: #ffc346; margin: 0 0 12px; font-size: 22px; letter-spacing: 0.5px; text-transform: uppercase; }
  #title { color: #fff; font-size: 18px; font-weight: 600; margin: 0 0 18px; max-width: 480px; text-align: center; line-height: 1.3; }
  video { width: 100%; max-width: 480px; height: auto; border-radius: 14px; background: #000; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
  button.primary {
    margin-top: 22px;
    background: #ffc346;
    color: #15151f;
    border: none;
    border-radius: 999px;
    padding: 18px 32px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    max-width: 480px;
    -webkit-tap-highlight-color: rgba(0,0,0,0);
  }
  button.primary:active { transform: scale(0.98); }
  .card {
    margin-top: 22px;
    width: 100%;
    max-width: 480px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,195,70,0.25);
    border-radius: 14px;
    padding: 16px;
  }
  .card-label { color: #ffc346; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin: 0 0 8px; }
  .card-content { font-size: 15px; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; margin: 0 0 12px; }
  button.copy {
    background: rgba(255,195,70,0.15);
    color: #ffc346;
    border: 1px solid rgba(255,195,70,0.4);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    -webkit-tap-highlight-color: rgba(0,0,0,0);
  }
  button.copy:active { transform: scale(0.98); }
  button.copy.copied { background: #ffc346; color: #15151f; }
  .hint { margin-top: 18px; padding: 12px 16px; background: rgba(255,195,70,0.1); border-radius: 10px; line-height: 1.5; font-size: 13px; max-width: 480px; color: #ccc; }
  .hint strong { color: #ffc346; }
  .small { color: #888; font-size: 12px; margin-top: 14px; max-width: 480px; line-height: 1.5; text-align: center; }
  .small a { color: #ffc346; text-decoration: none; word-break: break-all; }
  #status { margin-top: 12px; font-size: 14px; color: #ffc346; min-height: 20px; max-width: 480px; text-align: center; }
</style>
</head>
<body>
  <h1>Dad Joke Fix</h1>
  <div id="title"></div>
  <video id="player" controls playsinline></video>
  <button class="primary" id="saveBtn">📥 Save to Photos</button>
  <div id="status"></div>

  <div class="card" id="captionCard" style="display:none">
    <div class="card-label">TikTok Caption</div>
    <div class="card-content" id="caption"></div>
    <button class="copy" id="copyCaptionBtn">📋 Copy caption</button>
  </div>

  <div class="card" id="titleCard" style="display:none">
    <div class="card-label">Video Title</div>
    <div class="card-content" id="titleCopy"></div>
    <button class="copy" id="copyTitleBtn">📋 Copy title</button>
  </div>

  <div class="hint">
    <strong>Backup if the Save button doesn't work:</strong> long-press the video → tap <strong>Save to Photos</strong>.
  </div>
  <div class="small">
    Direct download: <a id="dl" href="#" download>tap here</a>
  </div>

<script>
(function () {
  // Parse hash params: #v=filename.mp4&t=Title&c=Caption
  var hash = (window.location.hash || '').replace(/^#/, '');
  var params = {};
  hash.split('&').forEach(function (kv) {
    if (!kv) return;
    var i = kv.indexOf('=');
    var k = i < 0 ? kv : kv.substring(0, i);
    var v = i < 0 ? '' : kv.substring(i + 1);
    try { params[k] = decodeURIComponent(v.replace(/\+/g, ' ')); }
    catch (e) { params[k] = v; }
  });

  var status = document.getElementById('status');
  if (!params.v) {
    status.textContent = 'No video specified in the link.';
    return;
  }

  var videoUrl = 'videos/' + params.v;
  var player = document.getElementById('player');
  var dl = document.getElementById('dl');
  player.src = videoUrl;
  dl.href = videoUrl;
  dl.setAttribute('download', params.v);

  if (params.t) {
    document.getElementById('title').textContent = params.t;
    document.getElementById('titleCopy').textContent = params.t;
    document.getElementById('titleCard').style.display = 'block';
    document.title = params.t;
  }
  if (params.c) {
    document.getElementById('caption').textContent = params.c;
    document.getElementById('captionCard').style.display = 'block';
  }

  function setupCopy(btnId, text) {
    var btn = document.getElementById(btnId);
    btn.addEventListener('click', async function () {
      try {
        await navigator.clipboard.writeText(text);
      } catch (e) {
        // Fallback for older browsers
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      btn.classList.add('copied');
      var orig = btn.textContent;
      btn.textContent = '✅ Copied!';
      setTimeout(function () {
        btn.textContent = orig;
        btn.classList.remove('copied');
      }, 1800);
    });
  }
  if (params.c) setupCopy('copyCaptionBtn', params.c);
  if (params.t) setupCopy('copyTitleBtn', params.t);

  document.getElementById('saveBtn').addEventListener('click', async function () {
    status.textContent = 'Preparing video...';
    try {
      var resp = await fetch(videoUrl);
      if (!resp.ok) throw new Error('Network ' + resp.status);
      var blob = await resp.blob();
      var file = new File([blob], params.v, { type: 'video/mp4' });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        status.textContent = 'Opening share sheet — pick Save Video.';
        await navigator.share({ files: [file], title: params.t || 'Dad Joke Fix' });
        status.textContent = '✅ Shared. Pick "Save Video" to send to Photos.';
      } else {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url; a.download = params.v;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        status.textContent = '⬇️ Download started. Move from Files to Photos manually.';
      }
    } catch (err) {
      status.textContent = '⚠️ ' + err.message + ' — try the long-press method below.';
    }
  });
})();
</script>
</body>
</html>
